# @package model
# ReLU-Dale, gamma=0 — identical to rnn_relu_Dale.yaml but with the "master inhibitor" silent-at-init
# construction: one inhibitory unit, driven only by the two CDDM context cues, holds a fixed random
# `master_inhib_frac` of the other units silent via deep, context-locked inhibition it projects nowhere
# else. Because the clamp's weights are unreachable by gradients (master->target runs through the dead
# target's zero ReLU derivative), the silenced units are truly unrescuable — the clean "no gradient ->
# no rescue" test. master_inhib_frac is the swept variable (0.25/0.5/0.75/1.0 via the launcher).
# See calibrate_master_inhibitor.py + docs/project_trajectory.md.
_target_: trainRNNbrain.rnns.RNN_torch.RNN_torch
RNN_tag: ""
activation_args: {"name": "relu", "slope": 1.0}
equation_type: "h"
N: 100
dt: 1
tau: 10
exc2inhR: 4.0
gamma: 0
weight_boundary: "sticky"
weight_boundary_eps: 1.0e-12
connectivity_density_rec: 1.0
spectral_rad: 1.2
sigma_rec: .05
sigma_inp: .05
sigma_out: .03
bias_range: [0.0, 0.0]
master_inhib_frac: 0.25      # fraction of units held silent by the master (swept in the launcher)
master_inhib_strength: 5.0   # deep master->target inhibitory weight magnitude
master_ctx_drive: 1.0        # master's weight from each of the two context cues
