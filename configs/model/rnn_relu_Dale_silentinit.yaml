# @package model
# ReLU-Dale, gamma=0 — identical to rnn_relu_Dale.yaml but with the deliberate silent-at-init
# perturbation: over-inhibit a fixed random 25% of units (set S, chosen from the net's seed so it is
# reconstructable) at initialisation by scaling the inhibitory columns of their W_rec rows by
# inhibitory_boost. Calibrated (calibrate_inhibitory_boost.py): boost>=1.25 fully silences S,
# 0% collateral, exactly 25% silent at init; 2.0 gives solid silencing that is still easily rescuable.
# Used to test whether frm PREVENTS vs RESURRECTS silence (train with frm, track set S).
_target_: trainRNNbrain.rnns.RNN_torch.RNN_torch
RNN_tag: ""
activation_args: {"name": "relu", "slope": 1.0}
equation_type: "h"
N: 100
dt: 1
tau: 10
exc2inhR: 4.0
gamma: 0   # cubic term off (the established regime); set to 0.1 here to restore it
weight_boundary: "sticky"      # "sticky" (clamp sign-violating weights to +/-eps each step) or "reflective" (|param|*sign)
weight_boundary_eps: 1.0e-12   # boundary value for the "sticky" clamp
connectivity_density_rec: 1.0
spectral_rad: 1.2
sigma_rec: .05
sigma_inp: .05
sigma_out: .03
bias_range: [0.0, 0.0]
inhibitory_boost: 2.0      # scale the inhibitory input to set S at init (None/absent = no perturbation)
silent_init_frac: 0.25     # fraction of units to force silent at init (set S)
